name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For $commitCount
          lfs: true

      - name: Extract git-rev
        run: |
          $commitCount = git rev-list --count HEAD
          $shortHash = git rev-parse --short HEAD
          "GIT_REV=r$commitCount.$shortHash" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Toolchain
        run: rustup default stable-msvc

      - name: Set version in Cargo.toml
        run: |
          $files = @(
              './Cargo.toml'
              './yas/Cargo.toml'
              './yas-genshin/Cargo.toml'
              './yas-application/Cargo.toml'
          )
          [regex]$pattern = '(?<=version = ").*(?=")'
          foreach ($file in $files) {
              $pattern.Replace((Get-Content -Raw $file), "0.0.0-$env:GIT_REV", 1) | Out-File -FilePath $file
          }

      - name: Build (Release)
        run: cargo build --release

      - name: Rename Outputs
        run: |
          Move-Item ./target/release/GOODScanner.exe "GOODScanner_$env:GIT_REV.exe"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOODScanner_${{ env.GIT_REV }}
          path: GOODScanner_${{ env.GIT_REV }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GIT_REV }}
          name: GOODScanner ${{ env.GIT_REV }}
          body: |
            Automated build from commit ${{ github.sha }}

            **Download:** `GOODScanner_${{ env.GIT_REV }}.exe`
          files: GOODScanner_${{ env.GIT_REV }}.exe
          make_latest: true
