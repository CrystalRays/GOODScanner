name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags for version dedup
          lfs: true

      - name: Extract version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $tag = "v$date"
          # Check if tag already exists; append .N suffix if so
          $existing = git tag -l "$tag*" | Sort-Object
          if ($existing) {
              $maxSuffix = 1
              foreach ($t in $existing) {
                  if ($t -match "^v\d{4}\.\d{2}\.\d{2}\.(\d+)$") {
                      $s = [int]$Matches[1]
                      if ($s -ge $maxSuffix) { $maxSuffix = $s + 1 }
                  } elseif ($t -eq $tag) {
                      if ($maxSuffix -lt 2) { $maxSuffix = 2 }
                  }
              }
              $tag = "$tag.$maxSuffix"
          }
          "VERSION=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Toolchain
        run: rustup default stable-msvc

      - name: Set version in Cargo.toml
        run: |
          $files = @(
              './Cargo.toml'
              './yas/Cargo.toml'
              './genshin/Cargo.toml'
              './application/Cargo.toml'
          )
          # Cargo semver forbids leading zeros, so strip them (2026.03.12 -> 2026.3.12)
          $parts = $env:VERSION.TrimStart('v').Split('.')
          $ver = ($parts | ForEach-Object { [int]$_ }) -join '.'
          [regex]$pattern = '(?<=version = ").*(?=")'
          foreach ($file in $files) {
              $pattern.Replace((Get-Content -Raw $file), $ver, 1) | Out-File -FilePath $file
          }

      - name: Build (Release)
        run: cargo build --release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOODScanner_${{ env.VERSION }}
          path: target/release/GOODScanner.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: target/release/GOODScanner.exe
          make_latest: true
